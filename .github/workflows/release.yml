name: Release CV PDF

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install tectonic
        run: |
          cd /tmp
          curl --proto '=https' --tlsv1.2 -fsSL https://drop-sh.fullyjustified.net | sh
          sudo mv tectonic /usr/local/bin/
          which tectonic
          tectonic -V || tectonic --help | head -3

      - name: Refresh OSS metrics
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run refresh-metrics

      - name: Build bilingual CVs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run build:all

      - name: Rename artifacts
        run: |
          mkdir -p dist
          TS=$(date -u +%Y%m%d-%H%M)
          cp render/cv-pt.pdf "dist/jhonathan-cv-pt-${TS}-${GITHUB_REF_NAME}.pdf"
          cp render/cv-en.pdf "dist/jhonathan-cv-en-${TS}-${GITHUB_REF_NAME}.pdf"
          ls -la dist/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/jhonathan-cv-*.pdf
          fail_on_unmatched_files: true
          generate_release_notes: true
